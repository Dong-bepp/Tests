name: Campus Book Trade CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码（升级到 v4，适配 Node.js 20+）
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python 环境（升级到 v5，适配 Node.js 20+）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      # 3. 安装 Python 依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest

      # 4. 运行测试，生成 Allure 结果数据
      - name: Run tests and generate Allure results
        run: |
          pytest --alluredir=./allure-results

      # 5. 下载官方 Allure Commandline 工具（替代 apt 安装，避免 PPA 问题）
      - name: Download and extract Allure Commandline
        run: |
          mkdir -p allure-bin
          curl -L https://github.com/allure-framework/allure2/releases/latest/download/allure-2.20.1.tgz -o allure.tgz
          tar -xzf allure.tgz -C allure-bin --strip-components=1
          echo "$PWD/allure-bin/bin" >> $GITHUB_PATH

      # 6. 生成 Allure HTML 报告
      - name: Generate Allure report
        run: |
          allure generate ./allure-results -o ./allure-report --clean

      # 7. 上传 Allure 报告为 Artifact（可下载）
      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: ./allure-report