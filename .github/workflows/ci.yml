name: Campus Book Trade CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------
      # 1. 拉取代码
      # ------------------------------
      - name: 拉取代码
        uses: actions/checkout@v4

      # ------------------------------
      # 2. 设置 Python 3.8
      # ------------------------------
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      # ------------------------------
      # 3. 安装依赖（pytest, selenium, allure-pytest 等）
      # ------------------------------
      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest

      # ⚠️ 新增：安装 Allure CLI（因为后面要用 allure generate 命令）
      - name: 安装 Allure 命令行工具
        run: |
          # 下载 Allure 2.24.0（可替换为最新版）
          curl -o allure.tgz -L https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.tgz
          # 解压到 /opt
          sudo tar -zxvf allure.tgz -C /opt/
          # 创建软链接，使 allure 命令全局可用
          sudo ln -s /opt/allure-2.24.0/bin/allure /usr/local/bin/allure
          # 验证安装
          allure --version

      # ------------------------------
      # 4. 进入静态文件目录，启动 HTTP 服务
      # ------------------------------
      - name: 启动本地 Web 服务（http.server 8080）
        run: |
          cd web_app || { echo "❌ web_app 目录不存在！请确认静态文件在哪个目录"; exit 1; }
          pwd
          ls -la
          nohup python -m http.server 8080 > server.log 2>&1 &
          echo "✅ 本地静态文件服务已启动：http://127.0.0.1:8080"
          cd ..

      # ------------------------------
      # 5. 等待服务启动
      # ------------------------------
      - name: 等待 Web 服务启动
        run: sleep 3

      # ------------------------------
      # 6. 运行测试，生成 Allure 结果数据
      # ------------------------------
      - name: 运行测试（pytest + allure）
        run: |
          pytest tests/ -v --alluredir=./allure-results

      # ------------------------------
      # 7. 生成 Allure HTML 报告（现在 allure 命令已可用）
      # ------------------------------
      - name: 生成 Allure 测试报告
        run: |
          allure generate ./allure-results -o ./allure-report --clean

      # ------------------------------
      # 8. 上传 Allure 报告为 Artifact
      # ------------------------------
      - name: 上传 Allure 测试报告
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: ./allure-report