name: Campus Book Trade CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # 允许手动运行

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------
      # 1. 拉取代码
      # ------------------------------
      - name: Checkout 代码
        uses: actions/checkout@v4

      # ------------------------------
      # 2. 设置 Python 3.8
      # ------------------------------
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      # ------------------------------
      # 3. 安装依赖（明确：重新加载 requirements.txt）
      #    包括 pytest, allure-pytest 等第三方库
      # ------------------------------
      - name: 安装 Python 依赖（来自 requirements.txt）
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest

      # ------------------------------
      # 4. 进入静态文件目录（比如 web_app/，存放 HTML/JS 前端模拟数据）
      #    请根据你的项目实际情况修改，比如改为 `cd .` 或 `cd static/`
      # ------------------------------
      - name: 进入 Web 应用（静态文件）目录
        run: |
          cd web_app  # 请确保该目录下有你的 HTML / JS / 静态资源
          pwd
          ls -la

      # ------------------------------
      # 5. 启动本地静态文件服务（http.server 8080），在后台运行
      # ------------------------------
      - name: 启动本地 Web 服务（监听 8080）
        run: |
          nohup python -m http.server 8080 &
          echo "✅ 本地静态文件服务已启动：http://127.0.0.1:8080"

      # ------------------------------
      # 6. 等待服务启动（简单等待 3 秒，可优化为检测端口是否可访问）
      # ------------------------------
      - name: 等待 Web 服务启动
        run: sleep 3

      # ------------------------------
      # 7. 运行测试（pytest），测试用例应该访问 http://127.0.0.1:8080
      # ------------------------------
      - name: 运行测试（pytest）
        run: |
          pytest tests/  # 请确保测试文件在 tests/ 目录，会访问本地服务

      # ------------------------------
      # 8. 生成 Allure 测试结果数据（如果测试中使用了 allure pytest）
      # ------------------------------
      - name: 生成 Allure 测试结果
        run: |
          pytest --alluredir=./allure-results  # 确保生成测试结果数据

      # ------------------------------
      # 9. 下载 Allure Commandline 工具（用于生成 HTML 报告）
      # ------------------------------
      - name: 下载 Allure CLI
        run: |
          mkdir -p allure-bin
          curl -L https://github.com/allure-framework/allure2/releases/latest/download/allure-2.20.1.tgz -o allure.tgz
          tar -xzf allure.tgz -C allure-bin --strip-components=1
          echo "$PWD/allure-bin/bin" >> $GITHUB_PATH

      # ------------------------------
      # 10. 生成 Allure HTML 报告
      # ------------------------------
      - name: 生成 Allure 测试报告
        run: |
          allure generate ./allure-results -o ./allure-report --clean

      # ------------------------------
      # 11. 上传 Allure 报告为 GitHub Actions Artifact（可下载）
      # ------------------------------
      - name: 上传 Allure 报告
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: ./allure-report